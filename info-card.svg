<svg xmlns="http://www.w3.org/2000/svg" width="490" height="280" viewBox="0 0 490 280" fill="none">
  <style>
    .bg { fill: #0d1117; rx: 12px; }
    .line {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      opacity: 0;
      animation: slideIn 0.35s ease-out forwards;
    }
    .title-user { fill: #58a6ff; font-weight: bold; font-size: 15px; }
    .title-at { fill: #8b949e; font-size: 15px; }
    .title-host { fill: #7ee787; font-weight: bold; font-size: 15px; }
    .sep { fill: #484f58; font-size: 13px; }
    
    .swatch {
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateX(-12px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <rect width="490" height="280" class="bg" stroke="#30363d" stroke-width="1" />
  
